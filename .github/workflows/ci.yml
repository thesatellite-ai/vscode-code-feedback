name: CI

# Manual only — run from the Actions tab (or `gh workflow run ci.yml`) to avoid
# spending Actions minutes on every push.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      # Type-check + emit. A clean strict-TS compile is the gate.
      - name: Compile
        run: pnpm run compile
      - name: Package
        run: pnpm dlx @vscode/vsce package --no-dependencies --allow-missing-repository --skip-license
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: code-feedback-vsix
          path: "*.vsix"
