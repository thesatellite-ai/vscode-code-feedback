name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # No build step — syntax-check the source and verify it packages cleanly.
      # For a no-dependency extension, a successful `vsce package` is the test.
      - name: Syntax check
        run: node --check extension.js
      - name: Package
        run: npx --yes @vscode/vsce package --allow-missing-repository --skip-license
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: code-feedback-vsix
          path: "*.vsix"
