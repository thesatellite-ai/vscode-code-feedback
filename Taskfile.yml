version: '3'

# Reusable commands for developing/installing the Code Feedback extension.
# Run `task --list` to see everything.
#
# Installed as a real .vsix (shows in the Extensions list, all windows). The
# installed copy is independent of this source folder, so after editing the
# code you must `task reinstall` then reload your editor windows.

# Tokens for publishing load from .env (git-ignored). See .env.example.
dotenv: ['.env']

vars:
  VSIX: code-feedback-notes-0.1.0.vsix

tasks:
  deps:
    desc: Install the toolchain (TypeScript + oxlint) via pnpm
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - pnpm install

  lint:
    desc: Lint src with oxlint
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - pnpm run lint

  build:
    desc: Lint + compile src/*.ts → out/extension.js
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - pnpm run lint
      - pnpm run compile

  watch:
    desc: Recompile on change (tsc --watch)
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - pnpm run watch

  package:
    # --no-dependencies: vsce can't walk pnpm's symlinked node_modules, and we
    # ship zero runtime deps, so skip its dependency check. Compile runs via
    # the vscode:prepublish script (direct `tsc`).
    desc: Compile and build the .vsix
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - pnpm dlx @vscode/vsce package --no-dependencies --allow-missing-repository --skip-license

  release:
    desc: Build the .vsix, tag, and create a GitHub Release for the current package.json version (needs gh auth)
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - task: package
      - |
        VER=$(node -p "require('./package.json').version")
        git tag "v$VER"
        git push origin "v$VER"
        gh release create "v$VER" "code-feedback-notes-$VER.vsix" --title "Code Feedback v$VER" --generate-notes

  publish:
    desc: Publish to the VS Code Marketplace (uses VSCE_PAT from .env)
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - task: package
      - pnpm dlx @vscode/vsce publish --no-dependencies -p "$VSCE_PAT"

  publish-ovsx:
    desc: Publish to Open VSX for Cursor/VSCodium users (uses OVSX_PAT from .env)
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - task: package
      - pnpm dlx ovsx create-namespace khanakia -p "$OVSX_PAT" || true
      - pnpm dlx ovsx publish "{{.VSIX}}" -p "$OVSX_PAT"

  reinstall:
    desc: Repackage and reinstall into VS Code + Cursor (run after editing the code)
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - task: package
      - code --install-extension "{{.VSIX}}" --force
      - cursor --install-extension "{{.VSIX}}" --force
      - echo ">> Installed. Reload each window (Cmd+Shift+P -> Reload Window) to apply."

  uninstall:
    desc: Remove the extension from VS Code + Cursor
    cmds:
      - code --uninstall-extension khanakia.code-feedback-notes || true
      - cursor --uninstall-extension khanakia.code-feedback-notes || true

  status:
    desc: Show whether the extension is installed in each editor
    cmds:
      - 'code --list-extensions | grep -i feedback && echo "VS Code: installed" || echo "VS Code: NOT installed"'
      - 'cursor --list-extensions | grep -i feedback && echo "Cursor: installed" || echo "Cursor: NOT installed"'

  notes-file:
    desc: Print the on-disk notes.json paths (global storage) if they exist
    cmds:
      - find "/Volumes/D/khanakia/.vscode" "/Volumes/D/khanakia/.cursor" -name notes.json -path "*code-feedback*" 2>/dev/null || echo "no notes.json yet"
